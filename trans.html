<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 题目转换工具 v1.2.1</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; font-size: 22px; }
        .section {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 12px;
            display: block;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
            color: #334155;
        }
        input[type="file"] {
            width: 100%;
            padding: 15px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
        }
        .sheet-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }
        .sheet-item {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .sheet-item input { margin-right: 8px; }
        .mapping-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #64748b; font-weight: 600; }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            font-size: 14px;
            outline: none;
        }
        .multi-select { height: 150px; }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .status.active { display: block; background: #dcfce7; color: #166534; }
        .hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        footer {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 11px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Excel 题目转换工具</h1>

    <!-- 1. 文件上传 -->
    <div class="section">
        <span class="section-title">1. 选择 Excel 文件</span>
        <input type="file" id="fileInput" accept=".xlsx, .xls" />
    </div>

    <div id="configArea" style="display: none;">
        <!-- 2. 工作表选择 -->
        <div class="section">
            <span class="section-title">2. 选择要包含的工作表</span>
            <div id="sheetList" class="sheet-list"></div>
        </div>

        <!-- 3. 列映射 -->
        <div class="section">
            <span class="section-title">3. 映射数据列</span>
            <div class="mapping-grid">
                <div>
                    <label>题目 (Title):</label>
                    <select id="selTitle"></select>
                </div>
                <div>
                    <label>答案 (Answer):</label>
                    <select id="selAnswer"></select>
                </div>
                <div>
                    <label>解析 (Analysis):</label>
                    <select id="selAnalysis"></select>
                </div>
                <div>
                    <label>选项列 (Options) - 可多选:</label>
                    <select id="selOptions" class="multi-select" multiple></select>
                    <div class="hint">按住 Ctrl / Cmd 键进行多选</div>
                </div>
            </div>
        </div>

        <button id="convertBtn">合并并导出 JSON</button>
    </div>

    <div id="status" class="status"></div>
</div>

<footer>
    <div>题目数据转换处理器</div>
    <div style="margin-top: 4px; font-weight: bold;">Version: 1.2.1</div>
</footer>

<script>
    let workbook = null;
    const fileInput = document.getElementById('fileInput');
    const configArea = document.getElementById('configArea');
    const sheetList = document.getElementById('sheetList');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');

    // 选择器
    const selTitle = document.getElementById('selTitle');
    const selAnswer = document.getElementById('selAnswer');
    const selAnalysis = document.getElementById('selAnalysis');
    const selOptions = document.getElementById('selOptions');

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const data = await file.arrayBuffer();
        workbook = XLSX.read(data);
        
        renderSheetCheckboxes();
        refreshHeaders();
        configArea.style.display = 'block';
    });

    function renderSheetCheckboxes() {
        sheetList.innerHTML = '';
        workbook.SheetNames.forEach(name => {
            const div = document.createElement('div');
            div.className = 'sheet-item';
            div.innerHTML = `<input type="checkbox" value="${name}" checked onchange="refreshHeaders()"> ${name}`;
            sheetList.appendChild(div);
        });
    }

    // 扫描所有选中 Sheet 的表头
    function refreshHeaders() {
        const selected = Array.from(sheetList.querySelectorAll('input:checked')).map(i => i.value);
        const headerSet = new Set();

        selected.forEach(name => {
            const sheet = workbook.Sheets[name];
            if (!sheet['!ref']) return;
            const data = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            if (data.length > 0) {
                data[0].forEach(h => {
                    if (h !== null && h !== undefined) headerSet.add(h.toString().trim());
                });
            }
        });

        const allHeaders = Array.from(headerSet);
        const controls = [selTitle, selAnswer, selAnalysis, selOptions];
        
        controls.forEach(ctrl => {
            const currentSelected = Array.from(ctrl.selectedOptions).map(o => o.value);
            ctrl.innerHTML = '';
            allHeaders.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h;
                opt.textContent = h;
                if (currentSelected.includes(h)) opt.selected = true;
                ctrl.appendChild(opt);
            });
        });
    }

    // 安全获取值，防止数字 0 丢失
    function getSafeValue(val) {
        if (val === 0 || val === "0") return "0";
        if (!val) return "";
        return val.toString().trim();
    }

    convertBtn.addEventListener('click', () => {
        const selected = Array.from(sheetList.querySelectorAll('input:checked')).map(i => i.value);
        if (selected.length === 0) return alert('请至少选择一个工作表');

        const mapping = {
            title: selTitle.value,
            answer: selAnswer.value,
            analysis: selAnalysis.value,
            options: Array.from(selOptions.selectedOptions).map(o => o.value)
        };

        if (!mapping.title || !mapping.answer) return alert('请配置题目和答案的列名');

        const result = [];
        const timeBase = Date.now().toString(36);
        let seq = 1;

        selected.forEach(sheetName => {
            const ws = workbook.Sheets[sheetName];
            const rows = XLSX.utils.sheet_to_json(ws);

            rows.forEach(row => {
                const titleStr = getSafeValue(row[mapping.title]);
                if (!titleStr) return; // 跳过空行

                // 答案处理：自动大写
                const rawAns = getSafeValue(row[mapping.answer]);
                const finalAns = rawAns.toUpperCase();

                // 生成 ID: 时间戳(36进制) + 顺序号(36进制)
                const qId = timeBase + seq.toString(36).padStart(3, '0');

                const item = {
                    id: qId,
                    title: titleStr,
                    option: mapping.options.map(k => getSafeValue(row[k])).filter(v => v !== ""),
                    answer: finalAns,
                    analysis: getSafeValue(row[mapping.analysis])
                };

                result.push(item);
                seq++;
            });
        });

        if (result.length === 0) return alert('未提取到任何数据，请检查映射。');

        const blob = new Blob([JSON.stringify(result, null, 4)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `questions_${timeBase}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        status.className = 'status active';
        status.textContent = `转换完成！合并了 ${selected.length} 个工作表，共导出 ${result.length} 条题目。`;
    });
</script>

</body>
</html>
