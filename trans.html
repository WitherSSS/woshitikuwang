<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 题目转换工具 v1.2.0</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card);
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; font-size: 24px; }
        .section {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
            border-left: 5px solid var(--primary);
            padding-left: 12px;
            color: #334155;
        }
        input[type="file"] {
            width: 100%;
            padding: 15px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            box-sizing: border-box;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        .sheet-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
        }
        .sheet-item {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .sheet-item input { margin-right: 10px; }
        .mapping-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        label { display: block; margin-bottom: 6px; font-size: 13px; color: #64748b; font-weight: 600; }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            font-size: 14px;
        }
        .multi-select { height: 160px; }
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }
        button:hover { background: #4338ca; transform: translateY(-1px); }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .status.active { display: block; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .hint { font-size: 12px; color: #94a3b8; margin-top: 6px; }
        footer {
            margin-top: 40px;
            color: #94a3b8;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Excel 题目 JSON 转换器</h1>

    <!-- 1. 文件上传 -->
    <div class="section">
        <span class="section-title">1. 选择 Excel 文件</span>
        <input type="file" id="fileInput" accept=".xlsx, .xls" />
    </div>

    <div id="mainUI" style="display: none;">
        <!-- 2. 题库基本信息 -->
        <div class="section">
            <span class="section-title">2. 题库设置</span>
            <label>题库唯一标识 (Bank ID):</label>
            <input type="text" id="bankId" placeholder="例如: BK_2023_001 (留空则自动生成)">
            <div class="hint">该 ID 将会包含在每个题目对象的 bank_id 字段中。</div>
        </div>

        <!-- 3. 工作表选择 -->
        <div class="section">
            <span class="section-title">3. 选择要合并的工作表</span>
            <div id="sheetList" class="sheet-list"></div>
        </div>

        <!-- 4. 列映射 -->
        <div class="section">
            <span class="section-title">4. 配置映射关系</span>
            <div class="mapping-grid">
                <div>
                    <label>题目 (Title):</label>
                    <select id="mapTitle"></select>
                </div>
                <div>
                    <label>标准答案 (Answer):</label>
                    <select id="mapAnswer"></select>
                </div>
                <div>
                    <label>解析 (Analysis):</label>
                    <select id="mapAnalysis"></select>
                </div>
                <div>
                    <label>选项列 (Options) - 可多选:</label>
                    <select id="mapOptions" class="multi-select" multiple></select>
                    <div class="hint">按住 Ctrl (Win) 或 Cmd (Mac) 多选</div>
                </div>
            </div>
        </div>

        <button id="convertBtn">合并数据并导出 JSON</button>
    </div>

    <div id="status" class="status"></div>
</div>

<footer>
    <div>© 2024 Excel To JSON Processor</div>
    <div style="margin-top: 5px; font-weight: bold;">Version: 1.2.0</div>
</footer>

<script>
    let wb = null;
    const fileInput = document.getElementById('fileInput');
    const mainUI = document.getElementById('mainUI');
    const sheetList = document.getElementById('sheetList');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const bankIdInput = document.getElementById('bankId');

    // Selectors
    const selTitle = document.getElementById('mapTitle');
    const selAnswer = document.getElementById('mapAnswer');
    const selAnalysis = document.getElementById('mapAnalysis');
    const selOptions = document.getElementById('mapOptions');

    // 默认生成一个随机的 Bank ID
    window.onload = () => {
        bankIdInput.value = 'BANK_' + Math.random().toString(36).substr(2, 6).toUpperCase();
    };

    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const data = await file.arrayBuffer();
        wb = XLSX.read(data);
        
        renderSheets();
        refreshHeaders();
        mainUI.style.display = 'block';
    });

    function renderSheets() {
        sheetList.innerHTML = '';
        wb.SheetNames.forEach(name => {
            const div = document.createElement('div');
            div.className = 'sheet-item';
            div.innerHTML = `<input type="checkbox" value="${name}" checked onchange="refreshHeaders()"> ${name}`;
            sheetList.appendChild(div);
        });
    }

    function refreshHeaders() {
        const selected = Array.from(sheetList.querySelectorAll('input:checked')).map(i => i.value);
        const headerSet = new Set();

        selected.forEach(name => {
            const sheet = wb.Sheets[name];
            if (!sheet['!ref']) return;
            const data = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            if (data.length > 0) {
                data[0].forEach(h => {
                    if (h !== null && h !== undefined) headerSet.add(h.toString().trim());
                });
            }
        });

        const allHeaders = Array.from(headerSet);
        const ctrls = [selTitle, selAnswer, selAnalysis, selOptions];
        
        ctrls.forEach(ctrl => {
            const prev = Array.from(ctrl.selectedOptions).map(o => o.value);
            ctrl.innerHTML = '';
            allHeaders.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h;
                opt.textContent = h;
                if (prev.includes(h)) opt.selected = true;
                ctrl.appendChild(opt);
            });
        });
    }

    function getVal(v) {
        if (v === 0 || v === "0") return "0";
        if (!v) return "";
        return v.toString().trim();
    }

    convertBtn.addEventListener('click', () => {
        const selected = Array.from(sheetList.querySelectorAll('input:checked')).map(i => i.value);
        if (selected.length === 0) return alert('请至少选择一个工作表');

        const bankId = bankIdInput.value.trim() || 'UNDEFINED';

        const config = {
            title: selTitle.value,
            answer: selAnswer.value,
            analysis: selAnalysis.value,
            options: Array.from(selOptions.selectedOptions).map(o => o.value)
        };

        if (!config.title || !config.answer) return alert('请确保映射了题目和答案列');

        const result = [];
        const timeKey = Date.now().toString(36);
        let seq = 1;

        selected.forEach(name => {
            const sheet = wb.Sheets[name];
            const rows = XLSX.utils.sheet_to_json(sheet);

            rows.forEach(row => {
                const title = getVal(row[config.title]);
                if (!title) return;

                const ansRaw = getVal(row[config.answer]);
                const ansFinal = ansRaw.toUpperCase();

                   // ID: 时间前缀 + 序号
                const qId = timeKey + seq.toString(36).padStart(3, '0');

                const item = {
                    id: qId,
                    bank_id: bankId,
                    title: title,
                    option: config.options.map(k => getVal(row[k])).filter(v => v !== ""),
                    answer: ansFinal,
                    analysis: getVal(row[config.analysis])
                };

                result.push(item);
                seq++;
            });
        });

        if (result.length === 0) return alert('数据读取失败，请检查映射。');

        const blob = new Blob([JSON.stringify(result, null, 4)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `bank_export_${bankId}_${timeKey}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        status.className = 'status active';
        status.textContent = `成功！已完成 ${selected.length} 个表的合并，共处理 ${result.length} 条数据。`;
    });
</script>

</body>
</html>
