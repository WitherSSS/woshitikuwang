<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 题目 JSON 转换器</title>
    <!-- 引入 SheetJS 库 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 25px; }
        .section {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
        }
        .section-title {
            font-weight: bold;
            margin-bottom: 12px;
            display: block;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }
        input[type="file"] {
            width: 100%;
            padding: 15px;
            border: 2px dashed var(--border);
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
        }
        .sheet-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 10px;
        }
        .sheet-item {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
        }
        .sheet-item input { margin-right: 8px; }
        .mapping-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #64748b; font-weight: 600; }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: white;
            font-size: 14px;
        }
        .multi-select { height: 140px; }
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }
        button:hover { background: #1d4ed8; }
        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .status.active { display: block; background: #dcfce7; color: #166534; }
        .hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Excel 转题目 JSON</h1>

    <!-- 1. 上传文件 -->
    <div class="section">
        <span class="section-title">1. 选择 Excel 文件</span>
        <input type="file" id="fileInput" accept=".xlsx, .xls" />
    </div>

    <div id="setup" style="display: none;">
        <!-- 2. 工作表选择 -->
        <div class="section">
            <span class="section-title">2. 选择要处理的工作表</span>
            <div id="sheetList" class="sheet-list"></div>
        </div>

        <!-- 3. 列映射 -->
        <div class="section">
            <span class="section-title">3. 配置字段映射</span>
            <div class="mapping-grid">
                <div>
                    <label>题目 (Title):</label>
                    <select id="mapTitle"></select>
                </div>
                <div>
                    <label>答案 (Answer):</label>
                    <select id="mapAnswer"></select>
                </div>
                <div>
                    <label>解析 (Analysis):</label>
                    <select id="mapAnalysis"></select>
                </div>
                <div>
                    <label>选项列 (Option) - 可多选:</label>
                    <select id="mapOptions" class="multi-select" multiple></select>
                    <div class="hint">按住 Ctrl 或 Command 进行多选</div>
                </div>
            </div>
        </div>

        <button id="convertBtn">开始转换并下载 JSON</button>
    </div>

    <div id="status" class="status"></div>
</div>

<script>
    let workbook = null;
    const fileInput = document.getElementById('fileInput');
    const setup = document.getElementById('setup');
    const sheetList = document.getElementById('sheetList');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');

    // 映射选择器
    const selTitle = document.getElementById('mapTitle');
    const selAnswer = document.getElementById('mapAnswer');
    const selAnalysis = document.getElementById('mapAnalysis');
    const selOptions = document.getElementById('mapOptions');

    // 文件读取
    fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const data = await file.arrayBuffer();
        workbook = XLSX.read(data);
        
        renderSheets();
        refreshHeaders();
        setup.style.display = 'block';
    });

    // 渲染 Sheet 列表
    function renderSheets() {
        sheetList.innerHTML = '';
        workbook.SheetNames.forEach(name => {
            const div = document.createElement('div');
            div.className = 'sheet-item';
            div.innerHTML = `<input type="checkbox" value="${name}" checked onchange="refreshHeaders()"> ${name}`;
            sheetList.appendChild(div);
        });
    }

    // 刷新合并后的表头（基于选中的 Sheet）
    function refreshHeaders() {
        const selected = Array.from(sheetList.querySelectorAll('input:checked')).map(i => i.value);
        const headerSet = new Set();

        selected.forEach(name => {
            const sheet = workbook.Sheets[name];
            if (!sheet['!ref']) return;
            const data = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            if (data.length > 0) {
                data[0].forEach(h => {
                    if (h !== null && h !== undefined) headerSet.add(h.toString().trim());
                });
            }
        });

        const allHeaders = Array.from(headerSet);
        const controls = [selTitle, selAnswer, selAnalysis, selOptions];
        
        controls.forEach(ctrl => {
            const savedValues = Array.from(ctrl.selectedOptions).map(o => o.value);
            ctrl.innerHTML = '';
            allHeaders.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h;
                opt.textContent = h;
                if (savedValues.includes(h)) opt.selected = true;
                ctrl.appendChild(opt);
            });
        });
    }

    // 安全获取单元格内容，保留“0”
    function getCellString(val) {
        if (val === 0 || val === "0") return "0";
        if (!val) return "";
        return val.toString().trim();
    }

    // 核心转换逻辑
    convertBtn.addEventListener('click', () => {
        const selectedSheets = Array.from(sheetList.querySelectorAll('input:checked')).map(i => i.value);
        if (selectedSheets.length === 0) return alert('请至少选择一个工作表');

        const config = {
            title: selTitle.value,
            answer: selAnswer.value,
            analysis: selAnalysis.value,
            options: Array.from(selOptions.selectedOptions).map(o => o.value)
        };

        if (!config.title || !config.answer) return alert('请确保已配置题目和答案的映射列');

        const result = [];
        // 生成基于当前时间的 ID 前缀 (36进制)
        const idPrefix = Date.now().toString(36);
        let counter = 1;

        selectedSheets.forEach(name => {
            const sheet = workbook.Sheets[name];
            const data = XLSX.utils.sheet_to_json(sheet);

            data.forEach(row => {
                const title = getCellString(row[config.title]);
                if (!title) return; // 题目为空则跳过

                // 处理答案：转大写
                const rawAnswer = getCellString(row[config.answer]);
                const finalAnswer = rawAnswer.toUpperCase();

                // 生成 ID: 前缀 + 序号 (36进制)
                const finalId = idPrefix + counter.toString(36).padStart(3, '0');

                const item = {
                    id: finalId,
                    title: title,
                    option: config.options.map(k => getCellString(row[k])).filter(v => v !== ""),
                    answer: finalAnswer,
                    analysis: getCellString(row[config.analysis])
                };

                result.push(item);
                counter++;
            });
        });

        if (result.length === 0) return alert('未提取到有效数据，请检查映射配置。');

        saveJson(result);
        
        status.className = 'status active';
        status.textContent = `成功！合并了 ${selectedSheets.length} 个表，共导出 ${result.length} 条题目。`;
    });

    function saveJson(data) {
        const blob = new Blob([JSON.stringify(data, null, 4)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `quiz_data_${new Date().getTime().toString(36)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
